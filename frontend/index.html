<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math PDF OCR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Math PDF OCR</h1>
    <div id="toolbar">
      <label class="upload-btn">
        Open PDF
        <input type="file" id="fileInput" accept=".pdf">
      </label>
      <div id="recentWrap" class="dropdown-wrap">
        <button id="recentBtn" title="Reopen a previously uploaded file">Recent &#9662;</button>
        <div id="recentList" class="dropdown"></div>
      </div>
      <span id="openPathWrap">
        <input type="text" id="pathInput" placeholder="/path/to/file.pdf" size="25">
        <button id="openPathBtn">Open path</button>
      </span>
      <span class="sep"></span>
      <span id="jumpWrap">
        Page: <input type="number" id="pageJump" min="1" value="1" disabled>
      </span>
      <span id="pageCount" class="info-text"></span>
      <span class="sep"></span>
      <span id="dpiControl">
        DPI:
        <input type="range" id="dpiSlider" min="100" max="400" value="200" step="50">
        <span id="dpiValue">200</span>
      </span>
      <span id="ocrDpiControl">
        OCR DPI:
        <input type="range" id="ocrDpiSlider" min="200" max="1200" value="600" step="100">
        <span id="ocrDpiValue">600</span>
      </span>
      <span id="backendControl">
        Engine:
        <select id="backendSelect"></select>
      </span>
      <button id="clearBtn" disabled>Clear results</button>
    </div>
  </header>
  <main id="main">
    <section id="viewer">
      <div id="pagesContainer"></div>
    </section>
    <div id="splitDivider"></div>
    <aside id="results">
      <h2>OCR Results</h2>
      <div id="resultsList"></div>
    </aside>
  </main>
  <div id="testModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Create Test Case</h3>
        <button id="testModalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="test-modal-img">
          <img id="testModalPreview" src="" alt="Region">
        </div>
        <div class="test-modal-field">
          <label>Test name</label>
          <input type="text" id="testNameInput" placeholder="e.g. test1">
        </div>
        <div class="test-modal-field">
          <label>Expected LaTeX output</label>
          <textarea id="testExpectedInput" rows="6" placeholder="Write the correct LaTeX here..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="testModalCancel">Cancel</button>
        <button id="testModalSave" class="primary">Save test</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="app.js"></script>
</body>
</html>
