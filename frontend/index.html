<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math PDF OCR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Math PDF OCR</h1>
    <div id="toolbar">
      <label class="upload-btn">
        Open PDF
        <input type="file" id="fileInput" accept=".pdf">
      </label>
      <div id="recentWrap" class="dropdown-wrap">
        <button id="recentBtn" disabled title="Reopen a previously uploaded file">Recent &#9662;</button>
        <div id="recentList" class="dropdown"></div>
      </div>
      <span class="sep"></span>
      <span id="jumpWrap">
        Page: <input type="number" id="pageJump" min="1" value="1" disabled>
      </span>
      <span id="pageCount" class="info-text"></span>
      <span class="sep"></span>
      <span id="dpiControl">
        DPI:
        <input type="range" id="dpiSlider" min="100" max="400" value="200" step="50">
        <span id="dpiValue">200</span>
      </span>
      <span id="ocrDpiControl">
        OCR DPI:
        <input type="range" id="ocrDpiSlider" min="200" max="1200" value="600" step="100">
        <span id="ocrDpiValue">600</span>
      </span>
      <span id="backendControl">
        Engine:
        <select id="backendSelect"></select>
      </span>
      <button id="clearBtn" disabled>Clear results</button>
    </div>
  </header>
  <main id="main">
    <section id="viewer">
      <div id="pagesContainer"></div>
    </section>
    <div id="splitDivider"></div>
    <aside id="results">
      <h2>OCR Results</h2>
      <div id="resultsList"></div>
    </aside>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="app.js"></script>
</body>
</html>
